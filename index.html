<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Quiz mat-fiz-inf</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.progress-bar {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress {
  height: 100%;
  width: 0%;
  background: #667eea;
  transition: 0.3s;
}

.question {
  animation: fade 0.4s ease;
}

label {
  display: block;
  margin: 10px 0;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  background: #f3f5ff;
  transition: 0.2s;
}

label:hover {
  background: #e0e7ff;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

#result {
  display: none;
  font-size: 20px;
  font-weight: bold;
  animation: pop 0.5s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pop {
  0% {transform: scale(0.7); opacity: 0;}
  100% {transform: scale(1); opacity: 1;}
}

/* konfetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: red;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container">

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<div id="quiz"></div>

<div id="result"></div>

<div style="margin-top:20px;">
    <p>Zeskanuj, aby odwiedzić stronę quizu:</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://finikkusu.github.io/Quiz-mat-fiz-inf/" alt="QR Code">
</div>

</div>

<script>
const questions = [
  {
    text: "Jak reagujesz na trudne zadania matematyczne?",
    answers: [
      {text: "Lubię wyzwania", points: 2},
      {text: "Staram się, ale się zniechęcam", points: 1},
      {text: "Unikam ich", points: 0}
    ]
  },
  {
    text: "Co myślisz o fizyce?",
    answers: [
      {text: "Bywa ciekawa", points: 1},
      {text: "Jest fascynująca", points: 2},
      {text: "Jest nudna", points: 0}
    ]
  },
  {
    text: "Programowanie i komputery:",
    answers: [
      {text: "Nie interesuje mnie", points: 0},
      {text: "Mogę się nauczyć", points: 1},
      {text: "Pasja", points: 2}
    ]
  },
  {
    text: "Logiczne myślenie:",
    answers: [
      {text: "Słabo", points: 0},
      {text: "Średnio", points: 1},
      {text: "Bardzo dobrze", points: 2}
    ]
  },
  {
    text: "Przyszłość:",
    answers: [
      {text: "IT/techniczna", points: 2},
      {text: "Nie wiem", points: 1},
      {text: "Humanistyczna", points: 0}
    ]
  }
];

let current = 0;
let score = 0;

function showQuestion() {
  const quiz = document.getElementById("quiz");
  const q = questions[current];

  document.getElementById("progress").style.width =
    ((current) / questions.length) * 100 + "%";

  quiz.innerHTML = `
    <div class="question">
      <h3>${current+1}. ${q.text}</h3>
      ${q.answers.map((a,i) => `
        <label>
          <input type="radio" name="answer" value="${a.points}">
          ${a.text}
        </label>
      `).join("")}
      <button onclick="next()">Dalej</button>
    </div>
  `;
}

function next() {
  const selected = document.querySelector('input[name="answer"]:checked');
  if (!selected) {
    alert("Wybierz odpowiedź!");
    return;
  }

  score += parseInt(selected.value);
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").innerHTML = "";
  document.getElementById("progress").style.width = "100%";

  let text = "";
  if (score >= 8) text = "🚀 Mat-fiz-inf jest dla Ciebie!";
  else if (score >= 4) text = "🤔 Masz potencjał!";
  else text = "🌱 To raczej nie dla Ciebie.";

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerText = text + " (" + score + "/10)";

  confetti();
}

function confetti() {
  for (let i = 0; i < 80; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "vw";
    el.style.background = `hsl(${Math.random()*360},100%,50%)`;
    el.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 3000);
  }
}

showQuestion();
</script>

</body>
</html>
